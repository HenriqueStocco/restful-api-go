info:
  name: create
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8000/api/v1/notes
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Dormir cedo",
        "description": "Dormir cedo no bagulho, muito importante",
        "color": "red"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
