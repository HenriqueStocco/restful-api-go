info:
  name: create
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8000/api/v1/note
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Stop the Rain",
        "description": "Stop the raind to falling down",
        "color": "blue"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
